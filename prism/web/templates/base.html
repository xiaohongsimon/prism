<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prism</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css?v=20">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/static/icon-192.png">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
    function exportNotion(btn, clusterId) {
        btn.disabled = true;
        btn.textContent = '搬运中...';
        fetch('/api/export-notion/' + clusterId, { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                if (data.ok) {
                    btn.textContent = '已搬运 ✓';
                    btn.classList.add('btn-notion-done');
                    if (data.url) { window.open(data.url, '_blank'); }
                } else {
                    btn.textContent = '失败: ' + (data.error || '未知错误');
                    btn.disabled = false;
                }
            })
            .catch(() => { btn.textContent = '网络错误'; btn.disabled = false; });
    }
    </script>
</body>
</html>
