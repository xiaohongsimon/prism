<div class="actions">
    <form class="action-form" hx-post="/feedback" hx-target="#actions-{{ item.signal_id }}" hx-swap="innerHTML">
        <input type="hidden" name="signal_id" value="{{ item.signal_id }}">
        <input type="hidden" name="action" value="like">
        <button type="submit" class="action-btn {% if feedback_state == 'like' %}liked{% endif %}">👍</button>
    </form>
    <form class="action-form" hx-post="/feedback" hx-target="#actions-{{ item.signal_id }}" hx-swap="innerHTML">
        <input type="hidden" name="signal_id" value="{{ item.signal_id }}">
        <input type="hidden" name="action" value="dislike">
        <button type="submit" class="action-btn {% if feedback_state == 'dislike' %}disliked{% endif %}">👎</button>
    </form>
    <form class="action-form" hx-post="/feedback" hx-target="#actions-{{ item.signal_id }}" hx-swap="innerHTML">
        <input type="hidden" name="signal_id" value="{{ item.signal_id }}">
        <input type="hidden" name="action" value="save">
        <button type="submit" class="action-btn {% if feedback_state == 'save' %}saved{% endif %}">⭐</button>
    </form>
</div>
