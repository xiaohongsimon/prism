  # === Model Economics ===
  - type: model_economics
    key: "economics:models"

  # === Practice ===
  - type: git_practice
    key: "practice:git"
    repos:
      - /Users/leehom/work/prism
    lookback_hours: 24

  - type: claude_sessions
    key: "practice:claude"
    memory_dirs:
      - /Users/leehom/.claude/projects

  # === HN Keyword Search (topic-based discovery) ===
  - type: hn_search
    key: "hn:search"
    queries:
      - "AI agent"
      - "LLM"
      - "open source AI"
      - "Claude"
      - "GPT"
      - "coding agent"
      - "design to code"
      - "AI startup"
      - "Gemma"
      - "Llama"
      - "benchmark SOTA"
      - "open weights model"
      - "video generation"
      - "text to video"
      - "image generation"
      - "multimodal model"
    max_per_query: 8
    lookback_hours: 48

  # === Reddit (community signals) ===
  - type: reddit
    key: "reddit:ai"
    subreddits:
      - MachineLearning
      - LocalLLaMA
      - artificial
      - ClaudeAI
      - StableDiffusion
      - aivideo
    max_per_sub: 8

  # === Product Hunt (new product launches) ===
  - type: producthunt
    key: "ph:daily"
    max_items: 10

  # === Deprioritized (kept for coverage) ===
  - type: x
    handle: swyx
    display_name: "swyx"
    depth: thread

  - type: arxiv
    key: "arxiv:daily"
    categories: [cs.LG, cs.CL, cs.AI]
    filter: keyword

  - type: github_trending
    key: "github:trending"
    track_days: 7
    deep_fetch: true

  - type: follow_builders
    key: "feed:follow-builders"
    url: https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-x.json
